version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aimsa
      POSTGRES_PASSWORD: aimsa_secret
      POSTGRES_DB: aimsa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimsa"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: aimsa
      MONGO_INITDB_ROOT_PASSWORD: aimsa_secret
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: aimsa
      POSTGRES_PASSWORD: aimsa_secret
      POSTGRES_DB: aimsa
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: aimsa
      MONGO_PASSWORD: aimsa_secret
      MONGO_DB: aimsa_logs
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LLM_SERVICE_URL: http://llm-service:8001
      CHROMA_PERSIST_DIR: /data/chroma
      CHROMA_MODE: persistent
      UPLOAD_DIR: /data/uploads
    volumes:
      - appdata:/data
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: ./backend
    command: celery -A app.tasks.celery_app:celery_app worker --loglevel=info --concurrency=2
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: aimsa
      POSTGRES_PASSWORD: aimsa_secret
      POSTGRES_DB: aimsa
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: aimsa
      MONGO_PASSWORD: aimsa_secret
      MONGO_DB: aimsa_logs
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LLM_SERVICE_URL: http://llm-service:8001
      CHROMA_PERSIST_DIR: /data/chroma
      CHROMA_MODE: persistent
      UPLOAD_DIR: /data/uploads
    volumes:
      - appdata:/data
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  llm-service:
    build: ./llm_service
    ports:
      - "8001:8001"
    environment:
      MODEL_NAME: Qwen/Qwen2.5-0.5B-Instruct
      DEVICE: cpu
      TORCH_DTYPE: float32
      HF_HOME: /root/.cache/huggingface
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      API_BASE: http://backend:8000/api/v1
    depends_on:
      - backend

volumes:
  pgdata:
  mongodata:
  appdata:
