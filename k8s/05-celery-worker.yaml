apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: aimsa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: aimsa-backend:latest
          command: ["celery", "-A", "app.tasks.celery_app:celery_app", "worker", "--loglevel=info", "--concurrency=2"]
          envFrom:
            - configMapRef:
                name: aimsa-config
            - secretRef:
                name: aimsa-secrets
          volumeMounts:
            - name: appdata
              mountPath: /data
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: appdata
          persistentVolumeClaim:
            claimName: appdata-pvc
