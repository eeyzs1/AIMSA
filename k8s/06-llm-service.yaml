apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-service
  namespace: aimsa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-service
  template:
    metadata:
      labels:
        app: llm-service
    spec:
      containers:
        - name: llm-service
          image: aimsa-llm-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
          env:
            - name: MODEL_NAME
              value: "Qwen/Qwen2.5-0.5B-Instruct"
            - name: DEVICE
              value: "cpu"
            - name: TORCH_DTYPE
              value: "float32"
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: TRANSFORMERS_OFFLINE
              value: "1"
            - name: HF_HOME
              value: "/root/.cache/huggingface"
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: llm-service
  namespace: aimsa
spec:
  selector:
    app: llm-service
  ports:
    - port: 8001
      targetPort: 8001
