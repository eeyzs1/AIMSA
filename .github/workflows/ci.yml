name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install linting tools
        run: pip install ruff
      - name: Lint backend
        run: ruff check backend/
      - name: Lint llm_service
        run: ruff check llm_service/

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aimsa
          POSTGRES_PASSWORD: aimsa_secret
          POSTGRES_DB: aimsa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install "pytest-asyncio>=0.23" pytest
      - name: Debug PG connectivity
        run: |
          echo "Testing PG connectivity..."
          python -c "
          import asyncio
          from sqlalchemy.ext.asyncio import create_async_engine
          async def test():
              engine = create_async_engine('postgresql+asyncpg://aimsa:aimsa_secret@localhost:5432/aimsa_test?ssl=disable')
              async with engine.connect() as conn:
                  result = await conn.execute(__import__('sqlalchemy').text('SELECT 1'))
                  print('PG OK:', result.scalar())
              await engine.dispose()
          asyncio.run(test())
          "
      - name: Run tests
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: aimsa
          POSTGRES_PASSWORD: aimsa_secret
          POSTGRES_DB: aimsa_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          MONGO_HOST: localhost
          LLM_SERVICE_URL: http://localhost:8001
        run: python -m pytest tests/ -v -W ignore::DeprecationWarning --tb=long -x 2>&1 || true

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t aimsa-backend ./backend
      - name: Build llm-service image
        run: docker build -t aimsa-llm ./llm_service
      - name: Build frontend image
        run: docker build -t aimsa-frontend ./frontend
