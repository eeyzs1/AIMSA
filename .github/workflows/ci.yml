name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install linting tools
        run: pip install ruff
      - name: Lint backend
        run: ruff check backend/
      - name: Lint llm_service
        run: ruff check llm_service/

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aimsa
          POSTGRES_PASSWORD: aimsa_secret
          POSTGRES_DB: aimsa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential libpq-dev
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install "pytest-asyncio>=0.23" pytest
      - name: Verify imports
        working-directory: backend
        env:
          CHROMA_MODE: ephemeral
          UPLOAD_DIR: /tmp/aimsa_uploads
          MONGO_HOST: localhost
          MONGO_PORT: 27017
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: aimsa
          POSTGRES_PASSWORD: aimsa_secret
          POSTGRES_DB: aimsa_test
        run: |
          echo "=== Python version ==="
          python --version
          echo "=== Installed packages ==="
          pip list 2>/dev/null | grep -iE "fastapi|sqlalchemy|asyncpg|pydantic|motor|chromadb|celery|httpx"
          echo "=== Testing imports ==="
          python -c "import app.config; print('config OK:', app.config.settings.POSTGRES_DB)" 2>&1
          python -c "import app.db.postgres; print('postgres OK')" 2>&1
          python -c "import app.db.mongo; print('mongo OK')" 2>&1
          python -c "import app.db.vector; print('vector OK')" 2>&1
          python -c "import app.main; print('main OK')" 2>&1
      - name: Run tests
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: aimsa
          POSTGRES_PASSWORD: aimsa_secret
          POSTGRES_DB: aimsa_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          MONGO_HOST: localhost
          MONGO_PORT: 27017
          MONGO_USER: aimsa
          MONGO_PASSWORD: aimsa_secret
          MONGO_DB: aimsa_logs
          LLM_SERVICE_URL: http://localhost:8001
          CHROMA_MODE: ephemeral
          UPLOAD_DIR: /tmp/aimsa_uploads
        run: python -m pytest tests/ -v -W ignore::DeprecationWarning --tb=long -x 2>&1

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t aimsa-backend ./backend
      - name: Build llm-service image
        run: docker build -t aimsa-llm ./llm_service
      - name: Build frontend image
        run: docker build -t aimsa-frontend ./frontend
