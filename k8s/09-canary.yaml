apiVersion: v1
kind: Service
metadata:
  name: llm-service-canary
  namespace: aimsa
spec:
  selector:
    app: llm-service
    track: canary
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: llm-service-stable
  namespace: aimsa
spec:
  selector:
    app: llm-service
    track: stable
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llm-canary-ingress
  namespace: aimsa
  annotations:
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "10"
spec:
  rules:
    - http:
        paths:
          - path: /generate
            pathType: Prefix
            backend:
              service:
                name: llm-service-canary
                port:
                  number: 8001
