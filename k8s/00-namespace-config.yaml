apiVersion: v1
kind: Namespace
metadata:
  name: aimsa
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aimsa-config
  namespace: aimsa
data:
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "aimsa"
  MONGO_HOST: "mongodb-service"
  MONGO_PORT: "27017"
  MONGO_DB: "aimsa_logs"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  LLM_SERVICE_URL: "http://llm-service:8001"
  CHROMA_PERSIST_DIR: "/data/chroma"
  UPLOAD_DIR: "/data/uploads"
---
apiVersion: v1
kind: Secret
metadata:
  name: aimsa-secrets
  namespace: aimsa
type: Opaque
stringData:
  POSTGRES_USER: aimsa
  POSTGRES_PASSWORD: CHANGE_ME_IN_PRODUCTION
  MONGO_USER: aimsa
  MONGO_PASSWORD: CHANGE_ME_IN_PRODUCTION
