apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: aimsa
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: aimsa-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: aimsa-config
            - secretRef:
                name: aimsa-secrets
          volumeMounts:
            - name: appdata
              mountPath: /data
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/monitoring/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/monitoring/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: appdata
          persistentVolumeClaim:
            claimName: appdata-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: aimsa
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: appdata-pvc
  namespace: aimsa
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
